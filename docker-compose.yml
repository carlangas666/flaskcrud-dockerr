services:

  web:
    build: .
    ports:
      - "5000:5000"
    expose:
      - "5000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.web.loadbalancer.server.port=5000"
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flaskcrud
    ports:
      - "3306:3306"